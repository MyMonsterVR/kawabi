name: Build
on:
  pull_request:
    paths:
      - '**'
      - '!**.md'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test App
    runs-on: 'ubuntu-24.04'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history, not the default shallow clone -- `git rev-list --count
          # HEAD` (app/build.gradle.kts's versionCode/BuildConfig.COMMIT_COUNT,
          # and this workflow's manifest.json commit_count below) needs the real
          # commit count, not "1" from a depth-1 checkout.
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build & test
        env:
          # Not committed (open-sourceable) -- unset on fork PRs, where the
          # build falls back to data/build.gradle.kts's fake placeholder URL.
          KAWABI_BASE_URL: ${{ secrets.KAWABI_BASE_URL }}
          # Unset here just means the build falls back to
          # data/build.gradle.kts's placeholder constants (MAL requires its
          # own registered app; Kitsu never implemented per-app registration,
          # see that file's comment) -- set these to build against real
          # tracker credentials.
          KAWABI_MAL_CLIENT_ID: ${{ secrets.KAWABI_MAL_CLIENT_ID }}
          KAWABI_KITSU_CLIENT_ID: ${{ secrets.KAWABI_KITSU_CLIENT_ID }}
          KAWABI_KITSU_CLIENT_SECRET: ${{ secrets.KAWABI_KITSU_CLIENT_SECRET }}
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kawabi-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Sign release APK
        if: github.event_name == 'push'
        uses: r0adkll/sign-android-release@a391126403df92c6a0a3988a829dd47f79b89ed7
        id: sign
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '35.0.1'

      - name: Generate update manifest
        if: github.event_name == 'push'
        run: |
          BASE_VERSION=$(grep -m1 'versionName = ' app/build.gradle.kts | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          COMMIT_COUNT=$(git rev-list --count HEAD)
          # release's versionNameSuffix (app/build.gradle.kts) appends
          # -$COMMIT_COUNT at build time, inside Gradle -- not reflected in the
          # raw file text this script greps, so append it here too.
          VERSION="${BASE_VERSION}-${COMMIT_COUNT}"
          cat > manifest.json <<EOF
          {
            "version": "${VERSION}",
            "commit_count": ${COMMIT_COUNT},
            "info": "Automated build from commit ${GITHUB_SHA:0:7}",
            "download_url": "https://apk.rasmushk.dk/v2/kawabi.apk?v=${COMMIT_COUNT}"
          }
          EOF

      - name: Deploy APK to VPS
        if: github.event_name == 'push'
        env:
          SIGNED_RELEASE_FILE: ${{ steps.sign.outputs.signedReleaseFile }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          # /v2/ -- distinct from the old fork's /v1/ path on the same domain
          # (apk.rasmushk.dk), so neither app's release clobbers the other's.
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/apk/v2"
          scp "${SIGNED_RELEASE_FILE}" \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/apk/v2/kawabi.apk
          scp manifest.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/apk/v2/manifest.json
